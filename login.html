<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9eb99a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ecotrack" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./Logo.png" />
    <link rel="apple-touch-icon" href="./Logo.png" />
    <title>Ecotrack | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./login.css" />
    <link rel="stylesheet" href="./alerts.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card" aria-label="Login form">
        <header class="auth-brand">
          <img src="./Logo.png" alt="Ecotrack logo" />
          <h1>ECOTRACK</h1>
        </header>

        <p class="auth-subtitle">
          Type in your Email Address and Password to Login or <a href="./signup.html">SIGNUP</a>.
        </p>

        <form class="auth-form" id="loginForm" novalidate>
          <label class="input-group">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                />
                <path
                  d="m4.5 7.2 6.65 5.16a1.4 1.4 0 0 0 1.7 0L19.5 7.2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input type="email" placeholder="Email" autocomplete="email" required />
          </label>

          <label class="input-group">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect
                  x="4"
                  y="10.5"
                  width="16"
                  height="10"
                  rx="2.25"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                />
                <path
                  d="M7.5 10.5V8a4.5 4.5 0 0 1 9 0v2.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
                <circle cx="12" cy="15.4" r="1.25" fill="currentColor" />
              </svg>
            </span>
            <input type="password" placeholder="Password" autocomplete="current-password" required />
          </label>

          <button type="submit" class="auth-login-btn">SIGN IN</button>
        </form>
      </section>
    </main>
    <script src="./api-client.js"></script>
    <script src="./alerts.js"></script>
    <script>
      const EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function toast(type, msg) {
        try {
          if (typeof window.showToast === "function") window.showToast(type, msg);
        } catch (err) {
          console.warn("Toast failed:", err);
        }
      }

      function goHome() {
        window.location.assign("./home.html");
      }

      document.querySelector("#loginForm")?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const btn = form.querySelector('button[type="submit"]');
        const email = form.querySelector('input[type="email"]').value.trim();
        const password = form.querySelector('input[type="password"]').value;

        if (!email || !password) {
          toast("warning", "Please fill in both email and password.");
          return;
        }

        if (!EMAIL_RX.test(email)) {
          toast("error", "Please enter a valid email address.");
          return;
        }

        if (btn) btn.disabled = true;
        try {
          await window.EcoApi.login(email, password);
          toast("success", "Welcome back! Logging you in...");
          window.setTimeout(goHome, 600);
        } catch (err) {
          const msg =
            err.code === "invalid_credentials"
              ? "Wrong email or password."
              : err.code === "db_unavailable"
                ? "Server database is offline. Try again shortly."
                : "Could not sign in. Check your connection.";
          toast("error", msg);
          if (btn) btn.disabled = false;
        }
      });
    </script>
    <script src="./auth-page-transitions.js"></script>
    <script src="./pwa-register.js"></script>
  </body>
</html>
