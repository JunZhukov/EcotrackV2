<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9eb99a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ecotrack" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./Logo.png" />
    <link rel="apple-touch-icon" href="./Logo.png" />
    <title>Ecotrack | Sign Up - Transportation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./signup.css" />
    <link rel="stylesheet" href="./alerts.css" />
  </head>
  <body>
    <main class="signup-page">
      <section class="signup-card" aria-label="Sign up - transportation">
        <a href="./signup-step-4.html" class="back-link" aria-label="Go back to previous step">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M15 5l-7 7 7 7"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Back
        </a>
        <header class="signup-top">
          <div class="signup-brand">
            <img src="./Logo.png" alt="Ecotrack logo" />
            <h1>SIGN UP</h1>
          </div>
          <p class="login-link">Already have an account? <a href="./login.html">LOGIN.</a></p>
        </header>

        <div class="signup-content">
          <h2>TRANSPORTATION</h2>
          <p class="subtitle">Your everyday vehicle.</p>
          <p class="question">What is your primary mode of transportation?</p>

          <form class="signup-form" id="stepForm" action="./signup-final.html" method="get" novalidate>
            <label class="select-wrap">
              <select required>
                <option value="" selected disabled>Select transportation</option>
                <option value="car-gas">Car (gasoline / diesel)</option>
                <option value="car-hybrid">Car (hybrid)</option>
                <option value="car-electric">Car (electric)</option>
                <option value="motorcycle">Motorcycle</option>
                <option value="public-transport">Public transport</option>
                <option value="carpool">Carpool</option>
                <option value="bike">Bike</option>
                <option value="walk">Walk</option>
              </select>
            </label>

            <button type="submit" class="next-btn">NEXT</button>
          </form>
        </div>
      </section>
    </main>
    <script src="./alerts.js"></script>
    <script>
      document.querySelector("#stepForm")?.addEventListener("submit", (event) => {
        const select = event.currentTarget.querySelector("select");
        if (!select || !select.value) {
          event.preventDefault();
          window.showToast("warning", "Please select an option before continuing.");
        }
      });
    </script>
    <script src="./pwa-register.js"></script>
  </body>
</html>
