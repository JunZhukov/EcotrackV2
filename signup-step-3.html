<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecotrack | Sign Up - Home Energy Use</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./signup.css" />
    <link rel="stylesheet" href="./alerts.css" />
  </head>
  <body>
    <main class="signup-page">
      <section class="signup-card" aria-label="Sign up - home energy use">
        <header class="signup-top">
          <div class="signup-brand">
            <img src="./Logo.png" alt="Ecotrack logo" />
            <h1>SIGN UP</h1>
          </div>
          <p class="login-link">Already have an account? <a href="./login.html">LOGIN.</a></p>
        </header>

        <div class="signup-content">
          <h2>HOME ENERGY USE</h2>
          <p class="subtitle">Your electricity usage at home.</p>
          <p class="question">About how much electricity do you use?</p>

          <form class="signup-form" id="stepForm" action="./signup-step-4.html" method="get" novalidate>
            <label class="select-wrap">
              <select required>
                <option value="" selected disabled>Select usage level</option>
                <option value="low">Low (less than 100 kWh / month)</option>
                <option value="below-average">Below average (100 - 300 kWh / month)</option>
                <option value="average">Average (300 - 600 kWh / month)</option>
                <option value="high">High (600 - 900 kWh / month)</option>
                <option value="very-high">Very high (more than 900 kWh / month)</option>
                <option value="unsure">Not sure</option>
              </select>
            </label>

            <button type="submit" class="next-btn">NEXT</button>
          </form>
        </div>
      </section>
    </main>
    <script src="./alerts.js"></script>
    <script>
      document.querySelector("#stepForm")?.addEventListener("submit", (event) => {
        const select = event.currentTarget.querySelector("select");
        if (!select || !select.value) {
          event.preventDefault();
          window.showToast("warning", "Please select an option before continuing.");
        }
      });
    </script>
  </body>
</html>
