<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecotrack | Sign Up - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./signup.css" />
    <link rel="stylesheet" href="./alerts.css" />
  </head>
  <body>
    <main class="signup-page">
      <section class="signup-card" aria-label="Sign up - create account">
        <header class="signup-top is-centered">
          <div class="signup-brand">
            <img src="./Logo.png" alt="Ecotrack logo" />
            <h1>SIGN UP</h1>
          </div>
          <p class="login-link">Already have an account? <a href="./login.html">LOGIN.</a></p>
        </header>

        <form class="signup-form-stack" id="signupForm" action="./login.html" method="get" novalidate>
          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                />
                <path
                  d="m4.5 7.2 6.65 5.16a1.4 1.4 0 0 0 1.7 0L19.5 7.2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input type="email" placeholder="Email" autocomplete="email" required />
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8.25" r="3.75" fill="none" stroke="currentColor" stroke-width="1.75" />
                <path
                  d="M4.75 20.25c1.4-3.7 4.05-5.5 7.25-5.5s5.85 1.8 7.25 5.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <input type="text" placeholder="Username" autocomplete="username" required />
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect
                  x="4.25"
                  y="10.25"
                  width="15.5"
                  height="10.25"
                  rx="2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                />
                <path
                  d="M8 10.25V7.5a4 4 0 1 1 8 0v2.75"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
                <circle cx="12" cy="15.5" r="1.1" fill="currentColor" />
              </svg>
            </span>
            <input type="password" placeholder="Password" autocomplete="new-password" required />
          </label>

          <button type="submit" class="signin-btn">SIGN IN</button>
        </form>
      </section>
    </main>
    <script src="./alerts.js"></script>
    <script>
      const SIGNUP_EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      document.querySelector("#signupForm")?.addEventListener("submit", (event) => {
        const form = event.currentTarget;
        const email = form.querySelector('input[type="email"]').value.trim();
        const username = form.querySelector('input[type="text"]').value.trim();
        const password = form.querySelector('input[type="password"]').value;

        if (!email || !username || !password) {
          event.preventDefault();
          window.showToast("error", "Please complete all fields before signing up.");
          return;
        }

        if (!SIGNUP_EMAIL_RX.test(email)) {
          event.preventDefault();
          window.showToast("error", "Please enter a valid email address.");
          return;
        }

        if (password.length < 6) {
          event.preventDefault();
          window.showToast("warning", "Password must be at least 6 characters.");
          return;
        }

        window.showToast("success", "Account created! Redirecting to login...");
      });
    </script>
  </body>
</html>
